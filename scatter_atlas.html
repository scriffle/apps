<style>
  :root {
    --bg: #f5f1e8;
    --panel: #fbf8f0;
    --ink: #1a1814;
    --muted: #6b6457;
    --line: #d9d0bd;
    --accent: #a8431a;
    --accent-soft: #f3e3d4;
    --trend: #2d4a5a;
    --tight: #2d6b3f;
    --tight-soft: #d8ead8;
    --moderate: #b8761d;
    --moderate-soft: #f3e5cc;
    --noisy: #8a4a20;
    --noisy-soft: #efd9c8;
    --contested: #a02828;
    --contested-soft: #f0d4d4;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
  }
  .app { display: flex; height: 100vh; }

  /* Sidebar */
  .sidebar {
    width: 320px;
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--line);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .brand {
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .brand-title {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 18px;
    line-height: 1.2;
    margin: 0;
    color: var(--ink);
  }
  .brand-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.02em;
  }
  .search-wrap {
    padding: 12px 18px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .search-input {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 4px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    background: var(--bg);
    color: var(--ink);
  }
  .search-input:focus {
    outline: none;
    border-color: var(--accent);
    background: white;
  }
  .filter-row {
    display: flex;
    gap: 4px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .filter-pill {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 3px 8px;
    border-radius: 10px;
    cursor: pointer;
    border: 1px solid transparent;
    font-weight: 600;
    user-select: none;
  }
  .filter-pill.all { background: #eae3d0; color: #5a5550; }
  .filter-pill.tight { background: var(--tight-soft); color: var(--tight); }
  .filter-pill.moderate { background: var(--moderate-soft); color: var(--moderate); }
  .filter-pill.noisy { background: var(--noisy-soft); color: var(--noisy); }
  .filter-pill.contested { background: var(--contested-soft); color: var(--contested); }
  .filter-pill.inactive { opacity: 0.35; }
  .expand-row {
    display: flex;
    gap: 14px;
    margin-top: 10px;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
  }
  .expand-link {
    cursor: pointer;
    user-select: none;
  }
  .expand-link:hover { color: var(--ink); }
  .tabs-scroll {
    overflow-y: auto;
    flex: 1;
    padding: 6px 0 24px;
  }
  .category-group { }
  .category-header {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    padding: 10px 22px 6px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    user-select: none;
  }
  .category-header:hover { color: var(--ink); }
  .category-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    font-weight: 500;
  }
  .category-arrow {
    margin-right: 6px;
    font-size: 9px;
    transition: transform 0.15s ease;
    display: inline-block;
  }
  .category-group.collapsed .category-arrow { transform: rotate(-90deg); }
  .category-group.collapsed .tabs-list { display: none; }
  .tab {
    padding: 6px 18px 6px 32px;
    cursor: pointer;
    font-size: 13px;
    border-left: 3px solid transparent;
    transition: background 0.1s ease;
    color: #3a3530;
    display: flex;
    gap: 6px;
    line-height: 1.3;
  }
  .tab:hover { background: rgba(168, 67, 26, 0.05); }
  .tab.active {
    background: var(--accent-soft);
    border-left-color: var(--accent);
    color: var(--ink);
    font-weight: 600;
  }
  .tab.hidden { display: none; }
  .tab-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    flex-shrink: 0;
    padding-top: 2px;
    min-width: 26px;
  }
  .tab-strength {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    margin-top: 6px;
    flex-shrink: 0;
  }
  .tab-strength.tight { background: var(--tight); }
  .tab-strength.moderate { background: var(--moderate); }
  .tab-strength.noisy { background: var(--noisy); }
  .tab-strength.contested { background: var(--contested); }
  .tab-text { flex: 1; }

  /* Main panel */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }
  .header {
    padding: 18px 32px 14px;
    border-bottom: 1px solid var(--line);
    background: var(--panel);
  }
  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 6px;
  }
  .header-meta {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .strength-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
  }
  .strength-badge.tight { background: var(--tight-soft); color: var(--tight); }
  .strength-badge.moderate { background: var(--moderate-soft); color: var(--moderate); }
  .strength-badge.noisy { background: var(--noisy-soft); color: var(--noisy); }
  .strength-badge.contested { background: var(--contested-soft); color: var(--contested); }
  .header h2 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 24px;
    margin: 0 0 6px;
    line-height: 1.25;
    color: var(--ink);
  }
  .header p {
    margin: 0;
    color: #3a3530;
    font-size: 13.5px;
    line-height: 1.55;
    max-width: 900px;
  }
  .caveat {
    margin-top: 8px;
    padding: 6px 10px;
    background: rgba(168, 67, 26, 0.05);
    border-left: 3px solid var(--accent);
    font-size: 12.5px;
    color: #5a3320;
    max-width: 900px;
    line-height: 1.45;
  }
  .source-line {
    margin-top: 6px;
    font-size: 11.5px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
  }

  /* Plot area */
  .plot-area {
    flex: 1;
    display: flex;
    overflow: hidden;
    min-height: 0;
  }
  #plot {
    flex: 1;
    padding: 12px 16px 12px 24px;
    min-width: 0;
    position: relative;
    overflow: hidden;
  }
  .hover-panel {
    width: 340px;
    flex-shrink: 0;
    background: var(--panel);
    border-left: 1px solid var(--line);
    padding: 16px 18px;
    overflow-y: auto;
    overflow-wrap: anywhere;
    word-break: break-word;
    position: relative;
    z-index: 2;
  }
  .hover-panel h3 {
    margin: 0 0 12px;
    font-size: 10.5px;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: 0.1em;
    font-weight: 600;
  }
  .hover-label {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    color: var(--ink);
    font-size: 17px;
    line-height: 1.25;
    margin-bottom: 10px;
    overflow-wrap: anywhere;
    word-break: break-word;
  }
  .hover-pair {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 6px 0;
    border-bottom: 1px solid var(--line);
    gap: 10px;
    flex-wrap: wrap;
  }
  .hover-pair-key {
    color: var(--muted);
    font-size: 11.5px;
    flex: 1 1 auto;
    min-width: 0;
    overflow-wrap: anywhere;
  }
  .hover-pair-val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    color: var(--ink);
    font-weight: 500;
    text-align: right;
    overflow-wrap: anywhere;
  }
  .hover-note {
    margin-top: 12px;
    padding: 9px 11px;
    background: rgba(45, 74, 90, 0.06);
    font-size: 12.5px;
    color: #2d4a5a;
    line-height: 1.45;
    border-radius: 2px;
    overflow-wrap: anywhere;
  }
  .placeholder {
    color: var(--muted);
    font-style: italic;
    font-size: 12.5px;
  }
  .fit-info {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid var(--line);
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }
  .fit-info strong { color: var(--ink); }
  .fit-eq {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    background: var(--bg);
    padding: 5px 7px;
    margin-top: 5px;
    display: block;
    border-radius: 2px;
    color: var(--trend);
    word-break: break-word;
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  .js-plotly-plot g.annotation { cursor: pointer; }

  .no-results {
    padding: 24px 22px;
    color: var(--muted);
    font-size: 13px;
    font-style: italic;
  }
</style>
</head>

  </main>
</div>

abel":"Cat"},{"x":15,"y":110,"label":"Dog"},{"x":50,"y":75,"label":"Sheep"},{"x":70,"y":65,"label":"Human"},{"x":100,"y":70,"label":"Pig"},{"x":500,"y":65,"label":"Cow"},{"x":600,"y":44,"label":"Horse"},{"x":800,"y":60,"label":"Giraffe"},{"x":4000,"y":30,"label":"Elephant"},{"x":100000,"y":8,"label":"Blue whale"}]},{"category":"Allometric biology","title":"Lifespan vs body mass","short":"Lifespan vs body mass","description":"Maximum lifespan rises with body mass to roughly the 0.2 power across mammals.","caveat":"Established trend with notable outliers: humans, bats, and naked mole rats live far longer than mass predicts.","evidence":"moderate","source":"AnAge database; de Magalhaes 2009","year":"2009","xLabel":"Body mass (kg)","yLabel":"Maximum lifespan (years)","xLog":true,"yLog":true,"fit":"power","data":[{"x":0.005,"y":1.5,"label":"Shrew"},{"x":0.015,"y":30,"label":"Little brown bat","note":"Outlier: bats live far longer than mass predicts."},{"x":0.02,"y":3,"label":"House mouse"},{"x":0.035,"y":32,"label":"Naked mole rat","note":"Famous outlier with negligible senescence."},{"x":0.3,"y":4,"label":"Rat"},{"x":2.5,"y":10,"label":"Rabbit"},{"x":4,"y":21,"label":"Cat"},{"x":15,"y":20,"label":"Dog"},{"x":50,"y":60,"label":"Chimpanzee"},{"x":50,"y":22,"label":"Sheep"},{"x":70,"y":90,"label":"Human","note":"Outlier above the line."},{"x":100,"y":27,"label":"Pig"},{"x":500,"y":22,"label":"Cow"},{"x":600,"y":62,"label":"Horse"},{"x":4000,"y":80,"label":"Elephant"},{"x":80000,"y":100,"label":"Sperm whale"},{"x":100000,"y":200,"label":"Bowhead whale","note":"Longest-lived mammal known."}]},{"category":"Allometric biology","title":"Brain mass vs body mass","short":"Brain mass vs body mass","description":"Brain mass scales with body mass to roughly the 3/4 power across vertebrates.","caveat":"Slope and reference line are method-dependent. Humans and corvids sit well above predictions; large herbivores fall below.","evidence":"moderate","source":"Jerison 1973; multiple compilations","year":"1973","xLabel":"Body mass (kg)","yLabel":"Brain mass (kg)","xLog":true,"yLog":true,"fit":"power","data":[{"x":0.02,"y":0.0004,"label":"Mouse"},{"x":0.3,"y":0.002,"label":"Rat"},{"x":4,"y":0.03,"label":"Cat"},{"x":6,"y":0.1,"label":"Macaque"},{"x":15,"y":0.07,"label":"Dog"},{"x":50,"y":0.4,"label":"Chimpanzee"},{"x":50,"y":0.13,"label":"Sheep"},{"x":70,"y":1.4,"label":"Human","note":"Largest residual above the line of any mammal."},{"x":150,"y":0.5,"label":"Gorilla"},{"x":200,"y":1.6,"label":"Bottlenose dolphin","note":"Cetacean encephalisation rivals primates."},{"x":500,"y":0.5,"label":"Cow"},{"x":600,"y":0.6,"label":"Horse"},{"x":4000,"y":5,"label":"African elephant"},{"x":50000,"y":8,"label":"Sperm whale","note":"Largest brain absolutely."}]},{"category":"Allometric biology","title":"Damuth's law: population density vs body mass","short":"Damuth's law (density vs mass)","description":"Population density falls with body mass to roughly the -3/4 power across mammals.","caveat":"Robust empirical regularity but scatter is large within trophic levels. Carnivores lie an order of magnitude below herbivores at the same mass.","evidence":"tight","source":"Damuth 1981 Nature 290:699","year":"1981","xLabel":"Body mass (kg)","yLabel":"Population density (individuals per km2)","xLog":true,"yLog":true,"fit":"power","data":[{"x":0.005,"y":1500,"label":"Shrew"},{"x":0.02,"y":500,"label":"Mouse"},{"x":0.3,"y":100,"label":"Rat"},{"x":2.5,"y":30,"label":"Rabbit"},{"x":6,"y":5,"label":"Red fox"},{"x":25,"y":12,"label":"Lynx"},{"x":80,"y":15,"label":"White-tailed deer"},{"x":100,"y":8,"label":"Wild boar"},{"x":200,"y":0.5,"label":"Black bear"},{"x":200,"y":0.1,"label":"Lion"},{"x":250,"y":0.02,"label":"Tiger"},{"x":400,"y":0.4,"label":"Moose"},{"x":800,"y":0.04,"label":"Polar bear"},{"x":4000,"y":0.5,"label":"African elephant"}]},{"category":"Allometric biology","title":"Maximum running speed vs body mass","short":"Speed vs body mass","description":"Top running speed function buildBreakAnnotation(axis, zeroed) {
  const isY = axis === 'y';
  return {
    xref: 'paper', yref: 'paper',
    x: 0, y: 0,
    xshift: isY ? 0 : 14,
    yshift: isY ? 14 : 0,
    text: '⫽',

    borderpad: 2,

    hovertext: zeroed ? 'Click to crop axis to data range' : 'Click to extend axis to zero'
  };
}

function buildArrowAnnotation(axis) {
  const isY = axis === 'y';
  return {

    x: 0, y: 0,
    xshift: isY ? 0 : 14,
    yshift: isY ? 14 : 0,
    ax: isY ? 58 : 0,

    axref: 'pixel', ayref: 'pixel',
    text: 'click',
    showarrow: true,
    arrowhead: 3,

function toggleAxisZero(axis) {
  if (!currentPlot) return;
  const isY = axis === 'y';
  if (isY) yZeroed = !yZeroed; else xZeroed = !xZeroed;
  const zeroed = isY ? yZeroed : xZeroed;
  const annIdx = isY ? yBreakIdx : xBreakIdx;
  const arrowIdx = isY ? yArrowIdx : xArrowIdx;
  const axisName = isY ? 'yaxis' : 'xaxis';
  const vals = currentPlot.data.map(p => isY ? p.y : p.x).filter(v => Number.isFinite(v));
  const maxVal = Math.max.apply(null, vals);
  const updates = {};
  if (zeroed) {
    updates[axisName + '.range'] = [0, maxVal * 1.08];
    updates[axisName + '.autorange'] = false;
  } else {
    updates[axisName + '.autorange'] = true;
  }
  if (annIdx >= 0) {
    updates['annotations[' + annIdx + '].font.color'] = zeroed ? '#a8431a' : '#1a1814';
    updates['annotations[' + annIdx + '].bgcolor'] = zeroed ? '#f3e3d4' : '#fbf8f0';
    updates['annotations[' + annIdx + '].hovertext'] = zeroed ? 'Click to crop axis to data range' : 'Click to extend axis to zero';
  }
  if (arrowIdx >= 0) {
    updates['annotations[' + arrowIdx + '].visible'] = false;
  }
  Plotly.relayout('plot', updates);
}

// ---------- Fitting ----------
function linreg(xs, ys) {
  const n = xs.length;
  let sx = 0, sy = 0, sxy = 0, sxx = 0;
  for (let i = 0; i < n; i++) {
    sx += xs[i]; sy += ys[i]; sxy += xs[i] * ys[i]; sxx += xs[i] * xs[i];
  }
  const slope = (n * sxy - sx * sy) / (n * sxx - sx * sx);
  const intercept = (sy - slope * sx) / n;
  return { slope, intercept };
}

function computeFit(d) {
  if (d.fit === 'none' || !d.fit) return null;
  if (d.fit === 'power') {
    const pts = d.data.filter(p => p.x > 0 && p.y > 0);
    if (pts.length < 3) return null;
    const f = linreg(pts.map(p => Math.log10(p.x)), pts.map(p => Math.log10(p.y)));
    return { type: 'power', ...f };
  }
  if (d.fit === 'exp') {
    const pts = d.data.filter(p => p.y > 0);
    if (pts.length < 3) return null;
    const f = linreg(pts.map(p => p.x), pts.map(p => Math.log10(p.y)));
    return { type: 'exp', ...f };
  }
  if (d.fit === 'linear') {
    if (d.data.length < 3) return null;
    return { type: 'linear', ...linreg(d.data.map(p => p.x), d.data.map(p => p.y)) };
  }
  if (d.fit === 'log') {
    const pts = d.data.filter(p => p.x > 0);
    if (pts.length < 3) return null;
    return { type: 'log', ...linreg(pts.map(p => Math.log10(p.x)), pts.map(p => p.y)) };
  }
  return null;
}

function buildFitLine(d, fit) {
  const xs = d.data.map(p => p.x).filter(x => Number.isFinite(x));
  let xmin = Math.min(...xs);
  let xmax = Math.max(...xs);
  if (d.xLog) { xmin = Math.max(xmin, 1e-30); }
  const fitX = [], fitY = [];
  const steps = 100;
  for (let i = 0; i <= steps; i++) {
    let x;
    if (d.xLog && xmin > 0) {
      const lx = Math.log10(xmin) + (Math.log10(xmax) - Math.log10(xmin)) * i / steps;
      x = Math.pow(10, lx);
    } else {
      x = xmin + (xmax - xmin) * i / steps;
    }
    let y;
    if (fit.type === 'power') {
      y = Math.pow(10, fit.slope * Math.log10(x) + fit.intercept);
    } else if (fit.type === 'exp') {
      y = Math.pow(10, fit.slope * x + fit.intercept);
    } else if (fit.type === 'log') {
      y = fit.slope * Math.log10(x) + fit.intercept;
    } else {
      y = fit.slope * x + fit.intercept;
    }
    fitX.push(x);
    fitY.push(y);
  }
  return { x: fitX, y: fitY };
}

function fitDescription(fit) {
  if (!fit) return null;
  if (fit.type === 'power') {
    const a = Math.pow(10, fit.intercept);
    return {
      label: 'Power-law fit',
      eq: `y = ${a.toExponential(2)} · x^${fit.slope.toFixed(2)}`,
      note: `Log-log slope = ${fit.slope.toFixed(2)}`
    };
  }
  if (fit.type === 'exp') {
    return {
      label: 'Exponential fit',
      eq: `y = ${Math.pow(10, fit.intercept).toExponential(2)} · 10^(${fit.slope.toFixed(3)} x)`,
      note: `Doubling per ${(Math.log10(2) / fit.slope).toFixed(2)} x-units`
    };
  }
  if (fit.type === 'linear') {
    return {
      label: 'Linear fit',
      eq: `y = ${fit.slope.toFixed(3)} x + ${fit.intercept.toFixed(3)}`,
      note: `Slope = ${fit.slope.toFixed(3)}`
    };
  }
  if (fit.type === 'log') {
    return {
      label: 'Logarithmic fit',
      eq: `y = ${fit.slope.toFixed(2)} · log10(x) + ${fit.intercept.toFixed(2)}`,
      note: `Slope = ${fit.slope.toFixed(2)} per decade`
    };
  }
  return null;
}

function formatNumber(n) {
  if (n === 0) return '0';
  if (!Number.isFinite(n)) return String(n);
  const abs = Math.abs(n);
  if (abs >= 1e6 || abs < 0.001) return n.toExponential(2);
  if (abs >= 100) return n.toFixed(0);
  if (abs >= 1) return n.toFixed(2);
  return n.toPrecision(3);
}

// ---------- Plot ----------
function renderPlot(d) {
  const fit = computeFit(d);
  const traces = [];

  traces.push({
    x: d.data.map(p => p.x),
    y: d.data.map(p => p.y),
    text: d.data.map(p => p.label),
    mode: 'markers',
    type: 'scatter',
    marker: {
      size: 10,
      color: '#a8431a',
      opacity: 0.82,
      line: { color: '#fbf8f0', width: 1.5 }
    },
    hovertemplate: '<b>%{text}</b><extra></extra>',
    name: 'Data'
  });

  if (fit) {
    const fitLine = buildFitLine(d, fit);
    traces.push({
      x: fitLine.x,
      y: fitLine.y,
      mode: 'lines',
      type: 'scatter',
      line: { color: '#2d4a5a', width: 2, dash: 'dot' },
      hoverinfo: 'skip',
      name: fitDescription(fit).label
    });
  }

  // Break-axis indicators: when a linear axis does not include zero
  currentPlot = d;
  yZeroed = false;
  xZeroed = false;
  yBreakIdx = -1;
  xBreakIdx = -1;
  yArrowIdx = -1;
  xArrowIdx = -1;
  const xVals = d.data.map(p => p.x).filter(Number.isFinite);
  const yVals = d.data.map(p => p.y).filter(Number.isFinite);
  const xMinData = xVals.length ? Math.min.apply(null, xVals) : 0;
  const yMinData = yVals.length ? Math.min.apply(null, yVals) : 0;
  const showYBreak = !d.yLog && yMinData > 0;
  const showXBreak = !d.xLog && xMinData > 0 && !d.xReversed;
  const breakAnnotations = [];
  if (showYBreak) {
    yBreakIdx = breakAnnotations.length;
    breakAnnotations.push(buildBreakAnnotation('y', false));
    yArrowIdx = breakAnnotations.length;
    breakAnnotations.push(buildArrowAnnotation('y'));
  }
  if (showXBreak) {
    xBreakIdx = breakAnnotations.length;
    breakAnnotations.push(buildBreakAnnotation('x', false));
    xArrowIdx = breakAnnotations.length;
    breakAnnotations.push(buildArrowAnnotation('x'));
  }

  const xAxis = {
    title: { text: d.xLabel, font: { family: 'Inter, sans-serif', size: 13, color: '#3a3530' } },
    type: d.xLog ? 'log' : 'linear',
    gridcolor: '#e8e0cd',
    zerolinecolor: '#d9d0bd',
    tickfont: { family: 'JetBrains Mono, monospace', size: 11, color: '#6b6457' }
  };
  if (d.xReversed) xAxis.autorange = 'reversed';

  const yAxis = {
    title: { text: d.yLabel, font: { family: 'Inter, sans-serif', size: 13, color: '#3a3530' } },
    type: d.yLog ? 'log' : 'linear',
    gridcolor: '#e8e0cd',
    zerolinecolor: '#d9d0bd',
    tickfont: { family: 'JetBrains Mono, monospace', size: 11, color: '#6b6457' }
  };

  const layout = {
    xaxis: xAxis,
    yaxis: yAxis,
    margin: { l: 75, r: 24, t: 18, b: 105 },
    paper_bgcolor: '#f5f1e8',
    plot_bgcolor: '#fbf8f0',
    showlegend: true,
    legend: {
      orientation: 'h',
      x: 0.5, y: -0.22,
      xanchor: 'center', yanchor: 'top',
      bgcolor: 'rgba(251,248,240,0.85)',
      bordercolor: '#d9d0bd',
      borderwidth: 1,
      font: { family: 'Inter, sans-serif', size: 11 }
    },
    annotations: breakAnnotations,
    hovermode: 'closest',
    font: { family: 'Inter, sans-serif' }
  };

  Plotly.newPlot('plot', traces, layout, {
    responsive: true,
    displaylogo: false,
    modeBarButtonsToRemove: ['lasso2d', 'select2d', 'toggleSpikelines']
  });

  const plotDiv = document.getElementById('plot');
  if (plotDiv.removeAllListeners) {
    plotDiv.removeAllListeners('plotly_hover');
    plotDiv.removeAllListeners('plotly_clickannotation');
  }
  plotDiv.on('plotly_hover', e => {
    const p = e.points[0];
    if (p.curveNumber === 0) {
      const pt = d.data[p.pointIndex];
      document.getElementById('hover').innerHTML = `
        <div class="hover-label">${pt.label || ''}</div>
        <div class="hover-pair"><span class="hover-pair-key">${d.xLabel}</span><span class="hover-pair-val">${formatNumber(pt.x)}</span></div>
        <div class="hover-pair"><span class="hover-pair-key">${d.yLabel}</span><span class="hover-pair-val">${formatNumber(pt.y)}</span></div>
        ${pt.note ? `<div class="hover-note">${pt.note}</div>` : ''}
      `;
    }
  });
  plotDiv.on('plotly_clickannotation', e => {
    if (e.index === yBreakIdx || e.index === yArrowIdx) toggleAxisZero('y');
    else if (e.index === xBreakIdx || e.index === xArrowIdx) toggleAxisZero('x');
  });

  const fitDesc = fitDescription(fit);
  const fitInfoDiv = document.getElementById('fit-info');
  if (fitDesc) {
    fitInfoDiv.innerHTML = `<strong>${fitDesc.label}</strong><span class="fit-eq">${fitDesc.eq}</span>${fitDesc.note}`;
  } else {
    fitInfoDiv.innerHTML = '<strong>No fit applied.</strong> The structure or shape of the points is the point of the plot.';
  }
}

function select(idx) {
  currentIdx = idx;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', +t.dataset.index === idx));
  const d = datasets[idx];
  document.getElementById('meta').textContent = `Plot ${idx + 1} of ${datasets.length} · ${d.category}`;
  document.getElementById('title').textContent = d.title;
  document.getElementById('description').textContent = d.description || '';
  document.getElementById('caveat').textContent = d.caveat || '';
  document.getElementById('caveat').style.display = d.caveat ? '' : 'none';
  const src = d.source ? (d.source + (d.year ? ` (${d.year})` : '')) : '';
  document.getElementById('source').textContent = src;
  document.getElementById('source').style.display = src ? '' : 'none';
  const badge = document.getElementById('strength');
  badge.textContent = d.evidence || 'moderate';
  badge.className = 'strength-badge ' + (d.evidence || 'moderate');
  document.getElementById('hover').innerHTML = '<div class="placeholder">Hover over a marker to see its values.</div>';
  renderPlot(d);

  // Open the parent category if collapsed
  const parentGroup = document.querySelector(`.category-group[data-category="${d.category.replace(/"/g, '\\"')}"]`);
  if (parentGroup && parentGroup.classList.contains('collapsed')) {
    parentGroup.classList.remove('collapsed');
  }
  const activeTab = document.querySelector('.tab.active');
  if (activeTab) activeTab.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// ---------- Search / filter ----------
function applyFilter() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  let anyVisible = false;
  document.querySelectorAll('.category-group').forEach(grp => {
    let visibleCount = 0;
    grp.querySelectorAll('.tab').forEach(t => {
      const idx = +t.dataset.index;
      const d = datasets[idx];
      const matchesText = !q ||
        (d.title && d.title.toLowerCase().includes(q)) ||
        (d.category && d.category.toLowerCase().includes(q)) ||
        (d.source && d.source.toLowerCase().includes(q)) ||
        (d.description && d.description.toLowerCase().includes(q)) ||
        (d.xLabel && d.xLabel.toLowerCase().includes(q)) ||
        (d.yLabel && d.yLabel.toLowerCase().includes(q));
      const matchesStrength = activeStrength === 'all' || d.evidence === activeStrength;
      if (matchesText && matchesStrength) {
        t.classList.remove('hidden');
        visibleCount += 1;
        anyVisible = true;
      } else {
        t.classList.add('hidden');
      }
    });
    grp.style.display = visibleCount > 0 ? '' : 'none';
    // Auto-open category if search is active and it has matches
    if (q && visibleCount > 0) {
      grp.classList.remove('collapsed');
    }
    // Update count
    const countEl = grp.querySelector('.category-count');
    const total = grp.querySelectorAll('.tab').length;
    countEl.textContent = visibleCount === total ? total : `${visibleCount}/${total}`;
  });
}

document.getElementById('search').addEventListener('input', applyFilter);
document.querySelectorAll('.filter-pill').forEach(p => {
  p.addEventListener('click', () => {
    activeStrength = p.dataset.strength;
    document.querySelectorAll('.filter-pill').forEach(o => o.classList.toggle('inactive', o.dataset.strength !== activeStrength && activeStrength !== 'all'));
    applyFilter();
  });
});
document.getElementById('expand-all').addEventListener('click', () => {
  document.querySelectorAll('.category-group').forEach(g => g.classList.remove('collapsed'));
});
document.getElementById('collapse-all').addEventListener('click', () => {
  document.querySelectorAll('.category-group').forEach(g => g.classList.add('collapsed'));
});

document.addEventListener('keydown', e => {
  if (document.activeElement && document.activeElement.tagName === 'INPUT') return;
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
    e.preventDefault();
    select(Math.min(datasets.length - 1, currentIdx + 1));
  } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
    e.preventDefault();
    select(Math.max(0, currentIdx - 1));
  }
});

window.addEventListener('resize', () => {
  Plotly.Plots.resize(document.getElementById('plot'));
});

select(0);
</script>
</body>
</html>
