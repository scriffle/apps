<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Luna Park — Force Data</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f0f2f5; padding: 16px; user-select: none; }
h2 { font-size: 15px; font-weight: 600; color: #1e293b; margin-bottom: 2px; }
.subtitle { font-size: 11px; color: #64748b; margin-bottom: 10px; }

/* Tabs */
.tabs { display: flex; gap: 2px; margin-bottom: 0; }
.tab {
  padding: 7px 18px; font-size: 12px; font-weight: 500;
  border: 1px solid #cbd5e1; border-bottom: none;
  border-radius: 6px 6px 0 0;
  background: #e2e8f0; color: #64748b;
  cursor: pointer; transition: background 0.15s;
}
.tab:hover { background: #f1f5f9; }
.tab.active { background: white; color: #1e293b; border-color: #cbd5e1; }
.tab-indicator {
  display: inline-block; width: 9px; height: 9px;
  border-radius: 50%; margin-right: 6px; vertical-align: middle;
}

/* Plot card */
.card {
  background: white; border: 1px solid #cbd5e1;
  border-radius: 0 6px 6px 6px; padding: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 8px; }
button {
  font-size: 11px; padding: 3px 10px; border-radius: 4px;
  border: 1px solid #cbd5e1; background: white; cursor: pointer; color: #334155;
}
button:hover { background: #f1f5f9; }
.container { position: relative; display: inline-block; }
svg { display: block; cursor: crosshair; }
.resize-handle {
  position: absolute; bottom: 0; right: 0;
  width: 18px; height: 18px; cursor: nwse-resize;
  background: linear-gradient(135deg, transparent 50%, #94a3b8 50%);
  border-bottom-right-radius: 6px;
}
</style>
</head>
<body>
<h2>Luna Park — Normal Force per unit mass (Enterprise ride)</h2>
<p class="subtitle">t = 280–450 s (zeroed to 0–170 s) · 0.05 s intervals · Drag to box-zoom · Scroll to zoom · Drag corner to resize</p>

<div class="tabs">
  <div class="tab active" data-channel="r"><span class="tab-indicator" style="background:#3b82f6"></span>Resultant</div>

  <div class="tab" data-channel="y"><span class="tab-indicator" style="background:#22c55e"></span>Y axis</div>
  <div class="tab" data-channel="z"><span class="tab-indicator" style="background:#f59e0b"></span>Z axis</div>
</div>

<div class="card">
  <div class="controls">
    <button id="resetBtn">↺ Reset zoom</button>
    <button id="smoothBtn">〜 Smooth: OFF</button>
    <label style="font-size:11px; color:#94a3b8; display:flex; align-items:center; gap:4px;" id="windowLabel">

        style="width:80px; accent-color:#3b82f6; opacity:0.4; pointer-events:none;">
      <span id="windowVal">15 pts</span>
    </label>
    <span style="font-size:11px; color:#64748b;" id="channelLabel">Force per unit mass (N/kg) · Resultant</span>
  </div>
  <div class="container" id="container">

    <div class="resize-handle" id="resizeHandle"></div>
  </div>
</div>

.7, -6.8, -1.5, -6.8, 9.7], [449.75, -7.0, -1.4, -6.8, 9.8], [449.8, -7.0, -1.4, -6.8, 9.8], [449.85, -7.0, -1.4, -7.2, 10.2], [449.9, -7.0, -1.4, -7.2, 10.2], [449.95, -6.8, -1.4, -6.7, 9.6], [450.0, -6.8, -1.4, -6.7, 9.6]];

const T0 = 280;
const ALL_DATA = RAW_DATA.filter(d => d[0] >= T0).map(d => [+(d[0]-T0).toFixed(4), d[1], d[2], d[3], d[4]]);

// Channel config: index into row, colour, label
const CHANNELS = {
  r: { idx: 4, color: '#3b82f6', fill: 'rgba(59,130,246,0.15)', label: 'Resultant', yLabel: 'Force per unit mass (N/kg) · Resultant' },
  x: { idx: 1, color: '#ef4444', fill: 'rgba(239,68,68,0.12)',   label: 'X axis',    yLabel: 'Force per unit mass (N/kg) · X' },
  y: { idx: 2, color: '#22c55e', fill: 'rgba(34,197,94,0.12)',   label: 'Y axis',    yLabel: 'Force per unit mass (N/kg) · Y' },
  z: { idx: 3, color: '#f59e0b', fill: 'rgba(245,158,11,0.12)',  label: 'Z axis',    yLabel: 'Force per unit mass (N/kg) · Z' },
};

let activeChannel = 'r';
let W = 860, H = 500;
const PAD = { top: 36, right: 40, bottom: 56, left: 68 };
let zoom = null;
let isDragging = false, dragStart = null, dragCurrent = null;
let smoothed = false, smoothWindow = 15;

const svg = document.getElementById('plot');

function setSize(w, h) {
  W = w; H = h;
  svg.setAttribute('width', w);
  svg.setAttribute('height', h);
}

function plotW() { return W - PAD.left - PAD.right; }
function plotH() { return H - PAD.top - PAD.bottom; }

function movingAverage(data, w) {
  const half = Math.floor(w / 2);
  return data.map((d, i) => {
    const lo = Math.max(0, i - half), hi = Math.min(data.length - 1, i + half);
    let sum = 0, count = 0;
    for (let j = lo; j <= hi; j++) { sum += data[j][1]; count++; }
    return [d[0], +(sum / count).toFixed(3)];
  });
}

function getChannelData(ch) {
  const idx = CHANNELS[ch].idx;
  const raw = ALL_DATA.map(d => [d[0], d[idx]]);
  return smoothed ? movingAverage(raw, smoothWindow) : raw;
}

function dataRange(data) {
  const ys = data.map(d => d[1]);
  const xMin = data[0][0], xMax = data[data.length-1][0];
  const yMin = Math.min(...ys), yMax = Math.max(...ys);
  const yPad = (yMax - yMin) * 0.08 || 1;
  return { xMin, xMax, yMin: yMin - yPad, yMax: yMax + yPad };
}

function getRange(data) {
  return zoom || dataRange(data);
}

function toSVG(x, y, r) {
  const pw = plotW(), ph = plotH();
  return {
    sx: PAD.left + (x - r.xMin) / (r.xMax - r.xMin) * pw,
    sy: PAD.top  + (r.yMax - y) / (r.yMax - r.yMin) * ph
  };
}

function fromSVG(sx, sy, r) {
  const pw = plotW(), ph = plotH();
  return {
    x: r.xMin + (sx - PAD.left) / pw * (r.xMax - r.xMin),
    y: r.yMax - (sy - PAD.top)  / ph * (r.yMax - r.yMin)
  };
}

function niceTicks(min, max, n) {
  const raw = (max - min) / n;
  const mag = Math.pow(10, Math.floor(Math.log10(Math.abs(raw) || 1)));
  const nice = [1,2,2.5,5,10].map(f => f*mag).find(f => f >= raw) || mag;
  const start = Math.ceil(min / nice) * nice;
  const ticks = [];
  for (let t = start; t <= max + 1e-9; t += nice) ticks.push(+t.toFixed(10));
  return ticks;
}

function render() {
  const ch = CHANNELS[activeChannel];
  const data = getChannelData(activeChannel);
  const r = getRange(data);
  const pw = plotW(), ph = plotH();

  const nX = Math.max(4, Math.round(pw / 90));
  const nY = Math.max(3, Math.round(ph / 55));
  const xTicks = niceTicks(r.xMin, r.xMax, nX);
  const yTicks = niceTicks(r.yMin, r.yMax, nY);

  const visible = data.filter(d => d[0] >= r.xMin && d[0] <= r.xMax);

  let parts = [];

  // Defs
  parts.push(`<defs><clipPath id="clip"><rect x="${PAD.left}" y="${PAD.top}" width="${pw}" height="${ph}"/></clipPath></defs>`);

  // Plot background
  parts.push(`<rect x="${PAD.left}" y="${PAD.top}" width="${pw}" height="${ph}" fill="#f8fafc"/>`);

  // Zero line (if in range)
  if (r.yMin < 0 && r.yMax > 0) {
    const {sy} = toSVG(0, 0, r);
    parts.push(`<line x1="${PAD.left}" y1="${sy.toFixed(1)}" x2="${PAD.left+pw}" y2="${sy.toFixed(1)}" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" clip-path="url(#clip)"/>`);
  }

  // Grid
  xTicks.forEach(t => {
    const {sx} = toSVG(t, 0, r);
    parts.push(`<line x1="${sx.toFixed(1)}" y1="${PAD.top}" x2="${sx.toFixed(1)}" y2="${PAD.top+ph}" stroke="#e2e8f0" stroke-width="1"/>`);
  });
  yTicks.forEach(t => {
    const {sy} = toSVG(0, t, r);
    parts.push(`<line x1="${PAD.left}" y1="${sy.toFixed(1)}" x2="${PAD.left+pw}" y2="${sy.toFixed(1)}" stroke="#e2e8f0" stroke-width="1"/>`);
  });

  // Line path
  if (visible.length > 1) {
    const pathD = visible.map((p, i) => {
      const {sx, sy} = toSVG(p[0], p[1], r);
      return (i === 0 ? 'M' : 'L') + sx.toFixed(1) + ' ' + sy.toFixed(1);
    }).join(' ');
    parts.push(`<path d="${pathD}" fill="none" stroke="${ch.color}" stroke-width="1.2" clip-path="url(#clip)"/>`);
  }

  // Points
  const r2 = visible.length > 800 ? 1.5 : 2.5;
  const op = visible.length > 800 ? 0.4 : 0.7;
  visible.forEach(p => {
    const {sx, sy} = toSVG(p[0], p[1], r);
    parts.push(`<circle cx="${sx.toFixed(1)}" cy="${sy.toFixed(1)}" r="${r2}" fill="${ch.color}" opacity="${op}" clip-path="url(#clip)"/>`);
  });

  // Axes
  parts.push(`<line x1="${PAD.left}" y1="${PAD.top}" x2="${PAD.left}" y2="${PAD.top+ph}" stroke="#475569" stroke-width="1.5"/>`);
  parts.push(`<line x1="${PAD.left}" y1="${PAD.top+ph}" x2="${PAD.left+pw}" y2="${PAD.top+ph}" stroke="#475569" stroke-width="1.5"/>`);

  // X ticks
  xTicks.forEach(t => {
    const {sx} = toSVG(t, 0, r);
    parts.push(`<text x="${sx.toFixed(1)}" y="${PAD.top+ph+16}" text-anchor="middle" font-size="10" fill="#64748b">${t.toFixed(1)}</text>`);
  });

  // Y ticks
  yTicks.forEach(t => {
    const {sy} = toSVG(0, t, r);
    parts.push(`<text x="${PAD.left-8}" y="${(sy+4).toFixed(1)}" text-anchor="end" font-size="10" fill="#64748b">${t.toFixed(1)}</text>`);
  });

  // Axis labels
  parts.push(`<text x="${PAD.left+pw/2}" y="${H-6}" text-anchor="middle" font-size="12" fill="#334155" font-weight="500">Time (s)</text>`);
  parts.push(`<text x="0" y="0" transform="translate(14,${PAD.top+ph/2}) rotate(-90)" text-anchor="middle" font-size="12" fill="#334155" font-weight="500">F/m (N/kg)</text>`);

  // Selection box
  if (isDragging && dragStart && dragCurrent) {
    const bx = Math.min(dragStart.sx, dragCurrent.sx);
    const by = Math.min(dragStart.sy, dragCurrent.sy);
    const bw = Math.abs(dragCurrent.sx - dragStart.sx);
    const bh = Math.abs(dragCurrent.sy - dragStart.sy);
    parts.push(`<rect x="${bx}" y="${by}" width="${bw}" height="${bh}" fill="rgba(59,130,246,0.08)" stroke="${ch.color}" stroke-width="1" stroke-dasharray="5,3"/>`);
  }

  svg.innerHTML = parts.join('');
}

// --- Tab switching ---
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeChannel = tab.dataset.channel;
    zoom = null;
    document.getElementById('channelLabel').textContent = CHANNELS[activeChannel].yLabel;
    render();
  });
});

// --- Smooth toggle ---
const smoothBtn = document.getElementById('smoothBtn');
const windowInput = document.getElementById('windowSize');
const windowVal = document.getElementById('windowVal');
const windowLabelEl = document.getElementById('windowLabel');

smoothBtn.addEventListener('click', () => {
  smoothed = !smoothed;
  smoothBtn.textContent = `〜 Smooth: ${smoothed ? 'ON' : 'OFF'}`;
  smoothBtn.style.background = smoothed ? '#dbeafe' : '';
  smoothBtn.style.borderColor = smoothed ? '#93c5fd' : '#cbd5e1';
  smoothBtn.style.color = smoothed ? '#1d4ed8' : '';
  windowInput.style.opacity = smoothed ? '1' : '0.4';
  windowInput.style.pointerEvents = smoothed ? 'auto' : 'none';
  windowLabelEl.style.color = smoothed ? '#334155' : '#94a3b8';
  render();
});

windowInput.addEventListener('input', () => {
  smoothWindow = +windowInput.value;
  windowVal.textContent = `${smoothWindow} pts`;
  if (smoothed) render();
});

// --- Zoom ---
function getSVGPos(e) {
  const rect = svg.getBoundingClientRect();
  return { sx: e.clientX - rect.left, sy: e.clientY - rect.top };
}

svg.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  isDragging = true; dragStart = getSVGPos(e); dragCurrent = dragStart;
});
svg.addEventListener('mousemove', e => {
  if (!isDragging) return;
  dragCurrent = getSVGPos(e); render();
});
svg.addEventListener('mouseup', e => {
  if (!isDragging) return;
  isDragging = false;
  const end = getSVGPos(e);
  const x1 = Math.min(dragStart.sx, end.sx), x2 = Math.max(dragStart.sx, end.sx);
  const y1 = Math.min(dragStart.sy, end.sy), y2 = Math.max(dragStart.sy, end.sy);
  if (x2-x1 > 8 && y2-y1 > 8) {
    const data = getChannelData(activeChannel);
    const r = getRange(data);
    const p1 = fromSVG(x1, y1, r), p2 = fromSVG(x2, y2, r);
    zoom = { xMin: p1.x, xMax: p2.x, yMin: p2.y, yMax: p1.y };
  }
  dragStart = null; dragCurrent = null; render();
});
svg.addEventListener('mouseleave', () => {
  if (isDragging) { isDragging = false; dragStart = null; dragCurrent = null; render(); }
});
svg.addEventListener('wheel', e => {
  e.preventDefault();
  const pos = getSVGPos(e);
  const data = getChannelData(activeChannel);
  const r = getRange(data);
  const cx = fromSVG(pos.sx, pos.sy, r);
  const factor = e.deltaY > 0 ? 1.15 : 0.87;
  zoom = {
    xMin: cx.x - (cx.x - r.xMin) * factor,
    xMax: cx.x + (r.xMax - cx.x) * factor,
    yMin: cx.y - (cx.y - r.yMin) * factor,
    yMax: cx.y + (r.yMax - cx.y) * factor,
  };
  render();
}, { passive: false });

document.getElementById('resetBtn').addEventListener('click', () => { zoom = null; render(); });

// --- Resize ---
document.getElementById('resizeHandle').addEventListener('mousedown', e => {
  e.preventDefault();
  const startX = e.clientX, startY = e.clientY, startW = W, startH = H;
  function onMove(ev) {
    setSize(Math.max(400, startW + ev.clientX - startX), Math.max(280, startH + ev.clientY - startY));
    render();
  }
  function onUp() { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseup', onUp); }
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
});

// Init
setSize(W, H);
render();
</script>
</body>
</html>
